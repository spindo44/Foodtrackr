name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Install MAUI workloads
      run: dotnet workload install maui android ios maccatalyst

    - name: Restore dependencies
      run: dotnet restore

    - name: Build API
      run: dotnet build Foodtrackr.Api/Foodtrackr.Api.csproj --no-restore

    - name: Run Tests
      run: dotnet test Foodtrackr.Tests/Foodtrackr.Tests.csproj --no-build --verbosity normal